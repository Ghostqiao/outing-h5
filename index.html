<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outing</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
}

.container {
  position: relative;
  height: 350vw; /* 控制滚动长度，之后可微调 */
}

.video {
  position: sticky;
  top: 0;
  width: 100vw;
  transform: rotate(90deg);
  transform-origin: top left;
}
</style>
</head>

<body>

<div class="container">
  <video class="video" src="video.mp4" autoplay muted playsinline></video>
</div>

</body>
</html>
