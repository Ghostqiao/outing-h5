<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outing Horizontal</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow-x: scroll;
  overflow-y: hidden;
  background: #000;
}

.container {
  position: relative;
  width: 350vw;   /* 控制横向长度，可调 */
  height: 100vh;
}

.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="container">
  <img class="bg" src="video.mp4">
</div>

</body>
</html>
