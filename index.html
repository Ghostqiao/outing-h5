<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outing</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  height: 100%;
}

.wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.video {
  position: absolute;
  height: 100vw;
  width: auto;
  transform: rotate(90deg);
}
</style>
</head>

<body>

<div class="wrapper">
  <video class="video" src="video.mp4" autoplay muted playsinline></video>
</div>

</body>
</html>
