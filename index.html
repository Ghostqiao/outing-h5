<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outing</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  height: 100%;
}

.wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.video {
  position: absolute;
  top: 50%;
  left: 50%;
  height: 100vw;
  width: auto;
  transform: translate(-50%, -50%) rotate(90deg);
  transform-origin: center center;
}
</style>
</head>

<body>

<div class="wrapper">
  <video class="video" src="video.mp4" autoplay muted playsinline></video>
</div>

</body>
</html>
