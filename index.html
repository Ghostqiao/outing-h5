<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outing Video</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow-x: auto;
  overflow-y: hidden;
  background: #000;
  height: 100%;
}

.container {
  height: 100vh;
}

video {
  height: 100vh;   /* 让视频高度填满屏幕 */
  width: auto;     /* 宽度按比例自动变超宽 */
  display: block;
}
</style>
</head>

<body>

<div class="container">
  <video src="video.mp4" autoplay muted playsinline></video>
</div>

</body>
</html>
