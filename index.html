<video 
  id="myVideo"
  src="video.mp4" 
  muted 
  loop 
  playsinline 
  webkit-playsinline>
</video>

<script>
const video = document.getElementById("myVideo");

function forcePlay() {
  video.play();
  document.removeEventListener("touchstart", forcePlay);
}

video.play().catch(() => {
  document.addEventListener("touchstart", forcePlay);
});
</script>
